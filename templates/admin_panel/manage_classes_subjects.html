{% extends 'base.html' %}
{% block title %}Manage Classes & Subjects{% endblock %}
{% block page_title %}Classes & Subjects{% endblock %}
{% block content %}
<div class="split">
    <section class="glass-card p-4" data-aos="fade-up">
        <h3>Create Class</h3>
        <form method="post" class="grid-form">
            {% csrf_token %}
            {{ class_form.as_p }}
            <button type="submit" name="create_class" class="btn btn-primary">Add Class</button>
        </form>
    </section>
    <section class="glass-card p-4" data-aos="fade-up" data-aos-delay="100">
        <h3>Create Subject</h3>
        <form method="post" class="grid-form">
            {% csrf_token %}
            {{ subject_form.as_p }}
            <button type="submit" name="create_subject" class="btn btn-primary">Add Subject</button>
        </form>
    </section>
</div>
{% endblock %}
